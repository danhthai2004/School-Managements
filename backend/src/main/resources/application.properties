spring.application.name=ISS
# Server Configuration
server.port=${PORT:8081}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/school_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# ==================== JDBC Batch Optimization ====================
# Group INSERT/UPDATE statements into batches for faster bulk operations
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
app.jwt.secret=${JWT_SECRET:8479ffb2912628c005604223f15ec198a6a14200680b96229ddd2a6bf811618b}
app.jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:604800}
app.jwt.reset-ttl-seconds=${JWT_RESET_TTL_SECONDS:600}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Seed system admin (firstLogin = false)
seed.system-admin.email=${SYSTEM_ADMIN_EMAIL:kazejustworking@gmail.com}
seed.system-admin.password=${SYSTEM_ADMIN_PASSWORD:issSP26capstone!}

# Google OAuth (ID token verification)
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}

# Mail (Gmail SMTP via App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${spring.mail.username:}}

# AI Chatbot (OpenRouter — OpenAI-compatible)
app.llm.api-key=${LLM_API_KEY:}
app.llm.model=${LLM_MODEL:google/gemini-2.0-flash-001}
app.llm.base-url=${LLM_BASE_URL:https://openrouter.ai/api/v1}

# AI Risk Analytics
app.risk.ai.api-key=${RISK_AI_API_KEY:}
app.risk.ai.model=${RISK_AI_MODEL:openai/gpt-4o-mini}
app.risk.ai.base-url=${RISK_AI_BASE_URL:https://openrouter.ai/api/v1}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Face Recognition Service (FastAPI)
face.recognition.service.url=${FACE_RECOGNITION_SERVICE_URL:http://localhost:8000}

logging.level.org.springframework.web=${LOG_LEVEL_WEB:WARN}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}

# ==================== Response Compression ====================
# Enable gzip compression for API responses (reduces transfer size by 60-80%)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=1024

# ==================== JSON Formatting ====================
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.date-format=yyyy-MM-dd

# ==================== Database Connection Pool Optimization (Neon) ====================
# Allow the pool to drop to zero connections when idle to let Neon scale to zero
spring.datasource.hikari.minimum-idle=0
# Time after which idle connections are closed (30 seconds)
spring.datasource.hikari.idle-timeout=30000
# Maximum lifetime of a connection (1 minute)
spring.datasource.hikari.max-lifetime=60000
# Maximum number of connections in the pool
spring.datasource.hikari.maximum-pool-size=5

